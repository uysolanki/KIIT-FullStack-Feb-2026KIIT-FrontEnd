<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: red;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            font-size: 16px;
            border-radius: 2px;
        }

        button:hover
        {
            cursor: pointer;
            opacity: 0.8;
        }

        #register-button{
            background-color: red;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            font-size: 16px;
            border-radius: 2px;
        }

        #login-button{
            background-color: blue;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            font-size: 16px;
            border-radius: 2px;
        }

        #submit-button{
            background-color: green;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            font-size: 16px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <button id="register-button">Register</button>
     <button id="login-button">Login</button>
      <button id="submit-button">Submit</button>
</body>
</html>
